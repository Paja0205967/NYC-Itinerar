let activeDay = 0;
let openStop = null;

function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function renderTabs() {
  const wrap = document.getElementById('tabs');
  wrap.innerHTML = days.map((d,i) => `
    <button class="tab${i===activeDay?' active':''}" style="--day-color:${d.color}" onclick="selectDay(${i})">
      <span class="tab-emoji">${d.emoji}</span>
      <span class="tab-num">Dan ${d.id}</span>
      <span class="tab-date">${d.date}</span>
    </button>
  `).join('');
}

function renderDayCard() {
  const d = days[activeDay];
  document.getElementById('dayLabel').textContent = `${d.date} · Dan ${d.id}`;
  document.getElementById('dayTitle').textContent = d.label;
  document.getElementById('daySubtitle').textContent = d.subtitle;
  document.getElementById('dayBadge').textContent = d.km;
  document.getElementById('dayDuration').textContent = d.duration;
  document.getElementById('dayTip').textContent = '💡 ' + d.tip;
  document.querySelector('.day-card').style.borderColor = hexToRgba(d.color, 0.3);
  document.querySelector('.day-label-sm').style.color = d.color;
  const badge = document.getElementById('dayBadge');
  badge.style.background = hexToRgba(d.color, 0.15);
  badge.style.color = d.color;
  document.querySelector('.day-tip').style.borderLeftColor = d.color;
  document.getElementById('hline').style.background = d.color;
  document.getElementById('ambient').style.background = `radial-gradient(ellipse at 50% 0%, ${hexToRgba(d.color, 0.08)} 0%, transparent 65%)`;
  // Maps button
  const existingBtn = document.getElementById('mapsBtn');
  if (existingBtn) existingBtn.remove();
  if (d.maps) {
    const btn = document.createElement('a');
    btn.id = 'mapsBtn';
    btn.href = d.maps;
    btn.target = '_blank';
    btn.className = 'maps-btn';
    btn.innerHTML = '🗺️ Otvori rutu u Google Maps';
    document.getElementById('dayCard').appendChild(btn);
  }
}

function renderStops() {
  const d = days[activeDay];
  const list = document.getElementById('stopsList');
  list.innerHTML = d.stops.map((s, i) => {
    const isLast = i === d.stops.length - 1;
    return `
    <div class="stop-row">
      <div class="stop-timeline">
        <div class="stop-dot">${s.icon}</div>
        ${!isLast ? '<div class="stop-line"></div>' : ''}
      </div>
      <div class="stop-content">
        <button class="stop-card" id="stop-${i}" onclick="toggleStop(${i})">
          <div class="stop-card-top">
            <div style="flex:1">
              <div class="stop-time">${s.time}</div>
              <div class="stop-name">${s.name}</div>
              <div class="stop-addr">${s.addr}</div>
            </div>
            <div class="stop-chevron">▼</div>
          </div>
          ${s.warn ? `<div class="stop-warning">⚠️ ${s.warn}</div>` : ''}
          <div class="stop-note">${s.note}</div>
        </button>
      </div>
    </div>
  `}).join('');
}

function toggleStop(i) {
  const card = document.getElementById('stop-' + i);
  if (openStop === i) {
    card.classList.remove('open');
    openStop = null;
  } else {
    if (openStop !== null) {
      const prev = document.getElementById('stop-' + openStop);
      if (prev) prev.classList.remove('open');
    }
    card.classList.add('open');
    openStop = i;
    setTimeout(() => card.scrollIntoView({behavior:'smooth', block:'nearest'}), 50);
  }
}

function selectDay(i) {
  activeDay = i;
  openStop = null;
  renderTabs();
  renderDayCard();
  renderStops();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

renderTabs();
renderDayCard();
renderStops();
</script>
